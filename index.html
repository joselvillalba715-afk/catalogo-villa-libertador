<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Catálogo — Distribuidora Villa Libertador</title>
  <meta name="description" content="Catálogo de productos, precios y promociones de Distribuidora Villa Libertador." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css?v=3" />
</head>
<body>

  <div style="display: none;">
    <p id="ultima-actualizacion"></p>
  </div>

  <div class="main-banner">
    <img src="images /banner-distribuidora.png" alt="Distribuidora Villa Libertador" class="banner-img" />
  </div>

  <div class="search-bar">
    <div class="search-bar__inner">
      <input
        type="search"
        id="buscador"
        class="search-bar__input"
        placeholder="Buscar producto…"
        aria-label="Buscar producto"
        autocomplete="off"
      />
    </div>
  </div>

  <nav class="cat-nav" id="cat-nav-wrap">
    <div class="cat-nav__inner">
      <select id="cat-nav" class="cat-selector__dropdown">
        <option value="">Todas las categorías</option>
      </select>
    </div>
  </nav>

  <main id="catalogo">
    <p class="state-message" id="estado">Cargando catálogo…</p>
  </main>

  <button class="cart-float" id="cart-float" aria-label="Ver mi pedido" type="button">
    <span class="cart-float__icon" aria-hidden="true">🛒</span>
    <span class="cart-float__label">Mi pedido</span>
    <span class="cart-float__badge hidden" id="cart-badge">0</span>
  </button>

  <div class="cart-backdrop hidden" id="cart-backdrop">
    <div class="cart-drawer" role="dialog" aria-label="Carrito de pedido">
      <div class="cart-drawer__header">
        <h2 id="cart-drawer-title">Mi pedido</h2>
        <button class="icon-btn" id="cart-close" type="button">Cerrar</button>
      </div>

      <div id="cart-view-items">
        <div class="cart-drawer__body" id="cart-items">
        </div>

        <!-- Cupón de descuento -->
        <div class="cart-coupon hidden" id="cart-coupon-block">
          <div class="cart-coupon__row">
            <input
              type="text"
              id="cupon-input"
              placeholder="Código de descuento"
              autocomplete="off"
              style="text-transform: uppercase;"
            />
            <button type="button" class="btn btn-secondary" id="btn-aplicar-cupon">Aplicar</button>
          </div>
          <p class="error-text" id="cupon-mensaje"></p>
          <div class="cart-coupon__aplicado hidden" id="cupon-aplicado-info">
            <span id="cupon-aplicado-texto"></span>
            <button type="button" id="btn-quitar-cupon">Quitar</button>
          </div>
        </div>

        <div class="cart-drawer__footer" id="cart-footer">
        </div>
      </div>

      <div id="cart-view-datos" class="hidden">
        <div class="cart-drawer__body">
          <p class="helper-text">Para identificar tu pedido, contanos quién lo hace:</p>
          <form id="form-datos-cliente">
            <div class="field">
              <label for="cliente-nombre">Nombre y apellido</label>
              <input type="text" id="cliente-nombre" required />
            </div>
            <div class="field">
              <label for="cliente-whatsapp">Tu número de WhatsApp</label>
              <input type="tel" id="cliente-whatsapp" required placeholder="Ej: 3517509439" />
            </div>
            <div class="field">
              <label for="cliente-pago">Forma de pago</label>
              <select id="cliente-pago" required>
                <option value="" disabled selected>Elegí una opción</option>
                <option value="Efectivo">Efectivo</option>
                <option value="QR">QR</option>
                <option value="Transferencia">Transferencia</option>
                <option value="Débito">Débito</option>
              </select>
            </div>
            <p class="error-text" id="datos-cliente-error"></p>
          </form>
        </div>
        <div class="cart-drawer__footer">
          <button type="submit" form="form-datos-cliente" class="btn btn-primary btn-block" id="btn-confirmar-pedido">
            Confirmar y enviar por WhatsApp
          </button>
          <button type="button" class="btn btn-secondary btn-block" id="btn-volver-items">Volver al pedido</button>
        </div>
      </div>
    </div>
  </div>

  <footer class="site-footer">
    Distribuidora Villa Libertador SRL · Barrio Santa Isabel Segunda, Córdoba
    <br />
    ¿Tenés una consulta? Escribinos por
    <a id="wa-footer-link" href="#" target="_blank" rel="noopener">WhatsApp</a>.
  </footer>

  <script type="module" src="app.js"></script>
</body>
</html>
